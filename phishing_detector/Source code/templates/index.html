<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phishing Detection Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between">

    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <span class="text-2xl">🛡️</span>
                <span class="font-bold text-xl tracking-tight bg-gradient-to-r from-blue-400 to-cyan-400 bg-clip-text text-transparent">PhishGuard AI</span>
            </div>
            <span class="text-xs font-semibold bg-blue-500/10 text-blue-400 px-3 py-1 rounded-full border border-blue-500/20">v1.0 Live</span>
        </div>
    </header>

    <main class="max-w-3xl w-full mx-auto px-4 py-12 flex-grow flex flex-col justify-center">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold tracking-tight sm:text-5xl mb-3">
                Is that link <span class="text-emerald-400">safe</span> or <span class="text-rose-500">phishing</span>?
            </h1>
            <p class="text-slate-400 text-lg">Analyze suspicious URLs instantly using Machine Learning URL pattern metrics.</p>
        </div>

        <div class="bg-slate-800/50 p-6 rounded-2xl border border-slate-700 shadow-xl backdrop-blur-sm">
            <form id="analysisForm" class="space-y-4">
                <div>
                    <label for="urlInput" class="block text-sm font-medium text-slate-300 mb-2">Analyze Link Target</label>
                    <input 
                        type="url" 
                        id="urlInput" 
                        required 
                        placeholder="https://example-secure-login.com" 
                        class="w-full px-4 py-3.5 bg-slate-950/70 border border-slate-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-100 placeholder-slate-500 transition-all"
                    >
                </div>
                <button 
                    type="submit" 
                    id="submitBtn"
                    class="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium py-3.5 px-4 rounded-xl shadow-lg shadow-blue-600/20 transition-all flex justify-center items-center space-x-2"
                >
                    <span id="btnText">Scan URL</span>
                    <svg id="spinner" class="animate-spin h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </form>
        </div>

        <div id="resultPanel" class="mt-8 p-6 rounded-2xl border transition-all duration-300 hidden">
            <div class="flex items-start space-x-4">
                <div id="resultIcon" class="text-4xl"></div>
                <div class="flex-1">
                    <div class="flex items-center justify-between">
                        <h3 id="resultTitle" class="text-xl font-bold"></h3>
                        <span id="resultBadge" class="text-xs uppercase font-extrabold px-2.5 py-1 rounded-md"></span>
                    </div>
                    <p id="scannedUrl" class="text-sm font-mono text-slate-400 mt-2 break-all bg-slate-950/40 p-2 rounded-lg border border-slate-800"></p>
                    
                    <div class="mt-4 pt-4 border-t border-slate-700/50 grid grid-cols-2 gap-4 text-xs text-slate-400">
                        <div>Confidence Level: <span id="confValue" class="text-slate-200 font-semibold"></span></div>
                        <div>Pattern Signatures: <span id="metaFeatures" class="text-slate-200 font-semibold"></span></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center py-6 border-t border-slate-800 text-xs text-slate-500">
        <p>© 2026 PhishGuard AI Application Platform. Built with Python & Flask.</p>
    </footer>

    <script>
        document.getElementById('analysisForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const urlInput = document.getElementById('urlInput').value;
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');
            const resultPanel = document.getElementById('resultPanel');

            // Set loading interface state
            submitBtn.disabled = true;
            btnText.textContent = "Analyzing Patterns...";
            spinner.classList.remove('hidden');
            resultPanel.classList.add('hidden');

            try {
                // Asynchronous connection linking the HTML request directly to Flask endpoint
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: urlInput })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Update interface layout variables depending on risk assessment logic
                    if (data.is_phishing) {
                        resultPanel.className = "mt-8 p-6 rounded-2xl border bg-rose-950/20 border-rose-500/30 text-rose-200";
                        document.getElementById('resultIcon').textContent = "⚠️";
                        document.getElementById('resultTitle').textContent = "Suspicious URL Detected!";
                        document.getElementById('resultBadge').className = "text-xs uppercase font-extrabold px-2.5 py-1 rounded-md bg-rose-500/20 text-rose-400 border border-rose-500/30";
                        document.getElementById('resultBadge').textContent = "Threat Flagged";
                    } else {
                        resultPanel.className = "mt-8 p-6 rounded-2xl border bg-emerald-950/20 border-emerald-500/30 text-emerald-200";
                        document.getElementById('resultIcon').textContent = "✅";
                        document.getElementById('resultTitle').textContent = "URL Appears Legitimate";
                        document.getElementById('resultBadge').className = "text-xs uppercase font-extrabold px-2.5 py-1 rounded-md bg-emerald-500/20 text-emerald-400 border border-emerald-500/30";
                        document.getElementById('resultBadge').textContent = "Verified Safe";
                    }

                    document.getElementById('scannedUrl').textContent = data.url;
                    document.getElementById('confValue').textContent = data.confidence;
                    document.getElementById('metaFeatures').textContent = `Char Count (${data.features_analyzed.length}), Special Flags`;
                    resultPanel.classList.remove('hidden');
                } else {
                    alert('Error evaluating target resource: ' + data.error);
                }
            } catch (error) {
                console.error("Networking Connection Failure: ", error);
                alert('Could not establish connection to detection back-end server.');
            } finally {
                // Revert interface loading button styles back to default operational setup
                submitBtn.disabled = false;
                btnText.textContent = "Scan URL";
                spinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
